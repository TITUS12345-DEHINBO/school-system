<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Greenfield Academy — Excellence in Secondary Education</title>
  <link rel="stylesheet" href="style.css" />
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600;700&display=swap"
    rel="stylesheet" />
</head>

<body>

  <!-- PUBLIC NAVBAR -->
  <nav id="publicNav" class="navbar">
    <div class="nav-container">
      <a href="#" class="nav-brand" onclick="navigate('home')">
        <div class="brand-logo">
          <svg viewBox="0 0 40 40" fill="none" width="38" height="38">
            <path d="M20 3L3 13v14l17 10 17-10V13L20 3z" fill="#1a6b3c" opacity="0.2" />
            <path d="M20 3L3 13l17 10 17-10L20 3z" fill="#1a6b3c" />
            <path d="M3 13v14l17 10V23L3 13z" fill="#145230" />
            <path d="M37 13v14l-17 10V23l17-10z" fill="#2d9e5f" />
            <circle cx="20" cy="16" r="4" fill="white" />
          </svg>
        </div>
        <span>Greenfield Academy</span>
      </a>
      <div class="nav-links" id="navLinks">
        <a href="#" onclick="navigate('home')" class="nav-link active" data-nav="home">Home</a>
        <a href="#" onclick="navigate('about')" class="nav-link" data-nav="about">About</a>
        <a href="#" onclick="navigate('programs')" class="nav-link" data-nav="programs">Programmes</a>
        <a href="#" onclick="navigate('news')" class="nav-link" data-nav="news">News</a>
        <a href="#" onclick="navigate('contact')" class="nav-link" data-nav="contact">Contact</a>
      </div>
      <div class="nav-actions">
        <button class="btn btn-ghost btn-sm" onclick="navigate('login')">Sign In</button>
        <button class="btn btn-primary btn-sm" onclick="navigate('signup')">Get Started</button>
        <button class="hamburger" id="hamburger" onclick="toggleMobileMenu()">
          <span></span><span></span><span></span>
        </button>
      </div>
    </div>
    <!-- Mobile drawer -->
    <div class="mobile-menu" id="mobileMenu">
      <button class="mobile-close" onclick="closeMobile()">✕</button>
      <a href="#" onclick="navigate('home');    closeMobile()">Home</a>
      <a href="#" onclick="navigate('about');   closeMobile()">About</a>
      <a href="#" onclick="navigate('programs');closeMobile()">Programmes</a>
      <a href="#" onclick="navigate('news');    closeMobile()">News</a>
      <a href="#" onclick="navigate('contact'); closeMobile()">Contact</a>
      <div class="mobile-auth">
        <button class="btn btn-outline-white btn-sm" onclick="navigate('login'); closeMobile()">Sign In</button>
        <button class="btn btn-primary btn-sm" onclick="navigate('signup');closeMobile()">Get Started</button>
      </div>
    </div>
    <div class="mobile-backdrop" id="mobileBackdrop" onclick="closeMobile()"></div>
  </nav>

  <!-- MAIN PAGE VIEW -->
  <div id="pageView"></div>

  <!-- TOAST NOTIFICATIONS -->
  <div id="toastContainer" class="toast-container"></div>

  <!-- MODAL (Add / Edit forms) -->
  <div id="modalOverlay" class="modal-overlay hidden" onclick="closeModal(event)">
    <div class="modal" onclick="event.stopPropagation()" id="modalBox">
      <div class="modal-header">
        <h3 id="modalTitle"></h3>
        <button class="modal-close" onclick="closeModal()">&times;</button>
      </div>
      <div class="modal-body" id="modalBody"></div>
    </div>
  </div>

  <!-- CONFIRM DIALOG -->
  <div id="confirmOverlay" class="modal-overlay hidden">
    <div class="modal modal-sm">
      <div class="modal-header">
        <h3 id="confirmTitle">Confirm Action</h3>
        <button class="modal-close" onclick="closeConfirm()">&times;</button>
      </div>
      <div class="modal-body">
        <p id="confirmMsg" style="margin-bottom:20px;color:var(--gray-600);font-size:0.9rem"></p>
        <div class="modal-actions">
          <button class="btn btn-ghost" onclick="closeConfirm()">Cancel</button>
          <button class="btn btn-danger" id="confirmBtn">Confirm</button>
        </div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>

</html>
